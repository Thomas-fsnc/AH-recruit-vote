<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>画像投票 - Facemash</title>
  
  <!-- Google Fonts（見やすいフォントを使用） -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet" />

  <style>
    /* =========================================
       全体のデザイン設定
       ========================================= */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ヘッダー */
    header {
      width: 100%;
      text-align: center;
      padding: 30px 20px 20px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: 0.05em;
      background: linear-gradient(90deg, #e94560, #0f3460);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      color: #a0aec0;
      margin-top: 8px;
      font-size: 0.95rem;
    }

    /* プログレスバー（投票の進捗） */
    .progress-container {
      width: 90%;
      max-width: 700px;
      margin: 10px auto;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      height: 10px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #e94560, #e91e8c);
      border-radius: 10px;
      transition: width 0.4s ease;
      width: 0%;
    }

    .progress-text {
      text-align: center;
      color: #a0aec0;
      font-size: 0.85rem;
      margin-top: 6px;
    }

    /* ======== ログイン画面 ======== */
    #login-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin-top: 60px;
      width: 90%;
      max-width: 400px;
    }

    #login-section .card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 40px 30px;
      width: 100%;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    #login-section h2 {
      font-size: 1.4rem;
      margin-bottom: 10px;
    }

    #login-section p {
      color: #a0aec0;
      font-size: 0.9rem;
      margin-bottom: 25px;
    }

    #email-input {
      width: 100%;
      padding: 14px 18px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 1rem;
      font-family: 'Noto Sans JP', sans-serif;
      outline: none;
      transition: border 0.3s;
    }

    #email-input::placeholder { color: #718096; }
    #email-input:focus { border-color: #e94560; }

    /* ======== ボタン共通スタイル ======== */
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: linear-gradient(135deg, #e94560, #e91e8c);
      color: white;
      margin-top: 15px;
      box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
    }

    .btn-primary:hover { box-shadow: 0 6px 20px rgba(233, 69, 96, 0.6); }

    /* ======== エラーメッセージ ======== */
    .error-msg {
      background: rgba(233, 69, 96, 0.15);
      border: 1px solid rgba(233, 69, 96, 0.4);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.9rem;
      color: #fc8181;
      text-align: center;
      display: none;  /* デフォルトは非表示 */
    }

    /* ======== 投票画面 ======== */
    #vote-section {
      display: none;  /* デフォルトは非表示（ログイン後に表示） */
      width: 95%;
      max-width: 1000px;
      margin: 20px auto;
    }

    .vote-instruction {
      text-align: center;
      color: #a0aec0;
      margin-bottom: 20px;
      font-size: 0.95rem;
    }

    .vote-instruction strong {
      color: #e94560;
    }

    /* 2枚の画像を横並びにするコンテナ */
    .images-container {
      display: grid;
      grid-template-columns: 1fr auto 1fr;  /* 左画像 | VS | 右画像 */
      gap: 20px;
      align-items: center;
    }

    /* VS テキスト */
    .vs-label {
      text-align: center;
      font-size: 2rem;
      font-weight: 900;
      color: #e94560;
      text-shadow: 0 0 20px rgba(233, 69, 96, 0.8);
    }

    /* 各画像カード */
    .image-card {
      background: rgba(255,255,255,0.06);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
    }

    .image-card:hover {
      transform: translateY(-6px) scale(1.02);
      border-color: #e94560;
      box-shadow: 0 15px 40px rgba(233, 69, 96, 0.35);
    }

    .image-card img {
      width: 100%;
      aspect-ratio: 4/3;   /* 画像の縦横比を4:3に統一 */
      object-fit: cover;   /* 画像をカードにフィットさせる */
      display: block;
    }

    .image-card .vote-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #e94560, #e91e8c);
      border: none;
      color: white;
      font-size: 1.1rem;
      font-weight: 700;
      font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer;
      transition: background 0.2s;
    }

    .image-card .vote-btn:hover {
      background: linear-gradient(135deg, #c53030, #c51670);
    }

    /* ローディング表示 */
    #loading {
      display: none;
      text-align: center;
      padding: 60px 20px;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top: 4px solid #e94560;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ======== 完了画面 ======== */
    #complete-section {
      display: none;
      text-align: center;
      padding: 60px 20px;
    }

    .complete-icon {
      font-size: 5rem;
      margin-bottom: 20px;
    }

    #complete-section h2 {
      font-size: 2rem;
      font-weight: 900;
      margin-bottom: 15px;
    }

    #complete-section p {
      color: #a0aec0;
      font-size: 1rem;
      line-height: 1.7;
    }

    /* スマートフォン対応 */
    @media (max-width: 600px) {
      .images-container {
        grid-template-columns: 1fr;  /* 縦並びに変更 */
      }
      .vs-label {
        font-size: 1.5rem;
        padding: 10px 0;
      }
      header h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

  <!-- ===== ヘッダー ===== -->
  <header>
    <h1>🏆 動物病院求人コンテスト投票</h1>
    <p>あなたが良いと思う画像をクリックしてください</p>
  </header>

  <!-- ===== プログレスバー（進捗表示） ===== -->
  <div class="progress-container" id="progress-container" style="display:none;">
    <div class="progress-bar" id="progress-bar"></div>
  </div>
  <div class="progress-text" id="progress-text"></div>

  <!-- ===== ログイン画面（最初に表示） ===== -->
  <div id="login-section">
    <div class="card">
      <h2>📧 メールアドレスで認証</h2>
      <p>Google Formで登録したメールアドレスを入力してください</p>
      <input type="email" id="email-input" placeholder="example@gmail.com" />
      <div class="error-msg" id="login-error"></div>
      <button class="btn btn-primary" onclick="startVoting()">投票を始める →</button>
    </div>
  </div>

  <!-- ===== ローディング表示 ===== -->
  <div id="loading">
    <div class="spinner"></div>
    <p>読み込み中...</p>
  </div>

  <!-- ===== 投票画面 ===== -->
  <div id="vote-section">
    <p class="vote-instruction">
      好きな方をクリックして投票してください（残り <strong id="remaining-count">10</strong> 回）
    </p>
    <div class="images-container">
      <!-- 左の画像カード -->
      <div class="image-card" id="card-a" onclick="vote('A')">
        <img id="img-a" src="" alt="画像A" />
        <button class="vote-btn">👆 こっちに投票</button>
      </div>
      <!-- VS ラベル -->
      <div class="vs-label">VS</div>
      <!-- 右の画像カード -->
      <div class="image-card" id="card-b" onclick="vote('B')">
        <img id="img-b" src="" alt="画像B" />
        <button class="vote-btn">👆 こっちに投票</button>
      </div>
    </div>
  </div>

  <!-- ===== 投票完了画面 ===== -->
  <div id="complete-section">
    <div class="complete-icon">🎉</div>
    <h2>投票完了！</h2>
    <p>
      10回の投票が完了しました。<br />
      ご参加ありがとうございました！<br /><br />
      結果は後ほどお知らせします。
    </p>
  </div>

  <!-- ===== JavaScript（動作処理） ===== -->
  <script>
    // ============================================================
    // ★ ここを必ず変更してください ★
    // Google Apps Script をデプロイした際に発行される「ウェブアプリのURL」を入力
    // 例: "https://script.google.com/macros/s/XXXXXXXX/exec"
    // ============================================================
    var GAS_URL = "https://script.google.com/macros/s/AKfycby2aCLXZ1mr1NG92Gl0OBD9f62IGf3KD8Fjg5iRjZ7wZzrm--CgEnPZ0EgVfZWTa1oOow/exec";

    // -------------------------------------------------------
    // 変数（プログラム実行中のデータを保持する場所）
    // -------------------------------------------------------
    var currentEmail  = "";     // 現在ログインしているメールアドレス
    var currentImageA = "";     // 現在表示中の画像A名
    var currentImageB = "";     // 現在表示中の画像B名
    var voteCount     = 0;      // 投票回数
    var maxVotes      = 10;     // 最大投票回数
    var isVoting      = false;  // 投票処理中かどうか（二重投票防止）

    // -------------------------------------------------------
    // 「投票を始める」ボタンを押した時の処理
    // -------------------------------------------------------
    function startVoting() {
      // メールアドレスを取得
      var email = document.getElementById("email-input").value.trim();
      
      // 入力チェック
      if (!email || !email.includes("@")) {
        showError("login-error", "正しいメールアドレスを入力してください");
        return;
      }

      currentEmail = email;
      showLoading(true);
      hideError("login-error");

      // Google Apps Scriptに「このメールは登録済みか？」を問い合わせる
      fetch(GAS_URL + "?action=checkVoter&email=" + encodeURIComponent(email))
        .then(function(response) { return response.json(); })
        .then(function(data) {
          showLoading(false);

          if (!data.success) {
            // 登録されていないメールの場合
            showError("login-error", data.error || "エラーが発生しました");
            return;
          }

          if (data.completed) {
            // すでに10回投票済みの場合
            showCompleteScreen();
            return;
          }

          // 認証成功！投票画面へ進む
          voteCount = data.voteCount;
          document.getElementById("login-section").style.display = "none";
          document.getElementById("progress-container").style.display = "block";
          loadNextPair(); // 最初の画像ペアを読み込む
        })
        .catch(function(err) {
          showLoading(false);
          showError("login-error", "通信エラーが発生しました。ページを再読み込みして試してください。");
          console.error(err);
        });
    }

    // -------------------------------------------------------
    // 次の画像ペアを読み込む
    // -------------------------------------------------------
    function loadNextPair() {
      showLoading(true);
      document.getElementById("vote-section").style.display = "none";

      // Google Apps Scriptに「次の対戦ペアをください」とリクエスト
      fetch(GAS_URL + "?action=getPair&email=" + encodeURIComponent(currentEmail))
        .then(function(response) { return response.json(); })
        .then(function(data) {
          showLoading(false);

          if (!data.success) {
            if (data.completed) {
              showCompleteScreen();
            } else {
              alert("エラー: " + (data.error || "不明なエラー"));
            }
            return;
          }

          // 取得した画像ペアを画面に表示する
          currentImageA = data.imageA;
          currentImageB = data.imageB;

          document.getElementById("img-a").src = data.urlA;
          document.getElementById("img-b").src = data.urlB;

          // 投票回数の更新（残り回数を表示）
          voteCount = data.voteCount;
          updateProgress();

          // 投票画面を表示
          document.getElementById("vote-section").style.display = "block";
        })
        .catch(function(err) {
          showLoading(false);
          alert("画像の読み込みに失敗しました。ページを再読み込みしてください。");
          console.error(err);
        });
    }

    // -------------------------------------------------------
    // 投票ボタンがクリックされた時の処理
    // winner: "A" または "B"
    // -------------------------------------------------------
    function vote(winner) {
      // 二重投票防止（処理中はクリックを無視）
      if (isVoting) return;
      isVoting = true;

      // 勝った画像の名前を決定
      var winnerName = (winner === "A") ? currentImageA : currentImageB;

      // ボタンを一時的に無効化（見た目のフィードバック）
      document.getElementById("vote-section").style.opacity = "0.5";

      // 投票データをGoogle Apps Scriptに送信
      fetch(GAS_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          email:  currentEmail,
          imageA: currentImageA,
          imageB: currentImageB,
          winner: winnerName
        })
      })
        .then(function(response) { return response.json(); })
        .then(function(data) {
          document.getElementById("vote-section").style.opacity = "1";
          isVoting = false;

          if (!data.success) {
            alert("投票に失敗しました: " + (data.error || "不明なエラー"));
            return;
          }

          voteCount = data.voteCount;

          if (data.completed) {
            // 10回投票完了！
            showCompleteScreen();
          } else {
            // まだ続く場合は次のペアを読み込む
            loadNextPair();
          }
        })
        .catch(function(err) {
          document.getElementById("vote-section").style.opacity = "1";
          isVoting = false;
          alert("送信エラーが発生しました。もう一度試してください。");
          console.error(err);
        });
    }

    // -------------------------------------------------------
    // プログレスバーを更新する
    // -------------------------------------------------------
    function updateProgress() {
      var percent = (voteCount / maxVotes) * 100;
      document.getElementById("progress-bar").style.width = percent + "%";
      document.getElementById("progress-text").textContent =
        voteCount + " / " + maxVotes + " 回投票済み";
      document.getElementById("remaining-count").textContent = (maxVotes - voteCount);
    }

    // -------------------------------------------------------
    // 投票完了画面を表示する
    // -------------------------------------------------------
    function showCompleteScreen() {
      document.getElementById("login-section").style.display   = "none";
      document.getElementById("vote-section").style.display    = "none";
      document.getElementById("loading").style.display         = "none";
      document.getElementById("progress-container").style.display = "block";
      document.getElementById("complete-section").style.display = "block";
      // プログレスバーを100%にする
      document.getElementById("progress-bar").style.width = "100%";
      document.getElementById("progress-text").textContent = maxVotes + " / " + maxVotes + " 回投票済み";
    }

    // -------------------------------------------------------
    // ローディング表示の切り替え
    // -------------------------------------------------------
    function showLoading(show) {
      document.getElementById("loading").style.display = show ? "block" : "none";
    }

    // -------------------------------------------------------
    // エラーメッセージの表示・非表示
    // -------------------------------------------------------
    function showError(id, message) {
      var el = document.getElementById(id);
      el.textContent = message;
      el.style.display = "block";
    }

    function hideError(id) {
      document.getElementById(id).style.display = "none";
    }

    // -------------------------------------------------------
    // Enterキーで投票開始できるようにする
    // -------------------------------------------------------
    document.getElementById("email-input").addEventListener("keydown", function(e) {
      if (e.key === "Enter") startVoting();
    });
  </script>
</body>
</html>
